name: Deploy Orbita24 to IONOS

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ionos-production-deploy
  cancel-in-progress: false

jobs:
  ftp-deploy:
    name: Upload website by FTP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4

      # Orbita24 is a plain PHP/HTML/CSS/JS site, so no frontend build is needed.
      # FTP credentials and the target directory must be configured as GitHub Secrets.
      - name: Deploy to IONOS hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          protocol: ftps
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/.ftp-deploy-sync-state.json
            **/.DS_Store
            **/Thumbs.db
            **/*.log
            **/*.bak
            **/*.tmp
            **/*.swp
            **/*~
            README.md
            DEPLOY.md
            HOSTING-READY.md
            .gitignore
